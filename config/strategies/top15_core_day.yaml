# Top15 核心进攻策略
name: top15_core_day
description: "Top15核心：ema5_dev + bull/bear power，日频缓冲，88%固定仓位"

weights:
  alpha: 0.05
  risk: 0.10
  enhance: 0.85

factors:
  alpha:
    - name: total_mv_log
      expression: "Log($total_mv + 1)"
      source: qlib
      ir: 0.08
  risk:
    - name: vol_std_10d
      expression: "Std($volume, 10) / (Mean($volume, 10) + 1)"
      source: qlib
      negate: true
      ir: 0.11
    - name: amt_std_6d
      expression: "Std($amount, 6) / (Mean($amount, 6) + 1)"
      source: qlib
      negate: true
      ir: 0.09
  enhance:
    - name: ema5_dev
      expression: "$close / EMA($close, 5) - 1"
      source: qlib
      ir: 0.51
    - name: bull_power
      expression: "$high - EMA($close, 13)"
      source: qlib
      ir: 0.68
    - name: bear_power
      expression: "$low - EMA($close, 13)"
      source: qlib
      ir: 0.69

selection:
  topk: 10
  universe: csi300
  neutralize_industry: false
  min_market_cap: 50
  sticky: 3
  buffer: 10

rebalance:
  freq: day

position:
  model: fixed
  stock_pct: 0.88
