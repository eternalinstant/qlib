# 实验策略 - 大势优化
name: bullbear_regime_guard_all
description: "实验层大势优化版：bull/bear 主线不变，但对 A 股牛短熊长做更保守的趋势仓位控制"

weights:
  alpha: 0.05
  risk: 0.15
  enhance: 0.80

factors:
  alpha:
    - name: roa
      ir: 0.30
  risk:
    - name: vol_std_20d
      ir: 0.31
    - name: turnover_rate_f
      ir: 0.42
  enhance:
    - name: ema5_dev
      expression: "$close / EMA($close, 5) - 1"
      source: qlib
      ir: 0.51
    - name: bull_power
      expression: "$high - EMA($close, 13)"
      source: qlib
      ir: 0.68
    - name: bear_power
      expression: "$low - EMA($close, 13)"
      source: qlib
      ir: 0.69

selection:
  topk: 12
  universe: all
  neutralize_industry: true
  min_market_cap: 80
  exclude_st: true
  exclude_new_days: 120
  sticky: 5
  buffer: 12

rebalance:
  freq: day

position:
  model: trend
  strong_bull_threshold: 0.06
  mild_bull_threshold: 0.025
  mild_bear_threshold: -0.015
  strong_bear_threshold: -0.04
  regime_allocations:
    strong_bull: 0.95
    mild_bull: 0.88
    neutral: 0.72
    mild_bear: 0.48
    strong_bear: 0.28
  opportunity_thresholds:
    - [-0.12, 0.78, light]
    - [-0.18, 0.86, moderate]
  smoothing_factor: 0.75

trading:
  buy_commission_rate: 0.0003
  sell_commission_rate: 0.0003
  sell_stamp_tax_rate: 0.0010
  slippage_bps: 5
  impact_bps: 5
  block_limit_up_buy: true
  block_limit_down_sell: true

validity:
  lookback_days: 60
  min_observations: 40
  min_total_return: -0.03
  min_annual_return: -0.06
  min_sharpe: 0.15
  max_drawdown: -0.10
  action: reduce
  reduce_to: 0.50
