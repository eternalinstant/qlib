name: fix_only_turnover
description: 只保留turnover_rate_f，去掉反转因子
weights:
  alpha: 0.5
  risk: 0.0
  enhance: 0.5
factors:
  alpha:
  - name: book_to_price
    expression: book_to_market
    source: parquet
    ir: 0.14
  - name: ocf_to_ev
    expression: ocf_to_ev
    source: parquet
    ir: 0.33
  - name: ebit_to_mv
    expression: ebit_to_mv
    source: parquet
    ir: 0.33
  enhance:
  - name: turnover_rate_f
    expression: turnover_rate_f
    source: parquet
    negate: true
    ir: 0.42
selection:
  mode: factor_topk
  topk: 10
  universe: all
  neutralize_industry: true
  min_market_cap: 80
  exclude_st: true
  exclude_new_days: 120
  sticky: 10
  score_smoothing_days: 10
rebalance:
  freq: month
position:
  model: trend
trading:
  buy_commission_rate: 0.0003
  sell_commission_rate: 0.0003
  sell_stamp_tax_rate: 0.001
  slippage_bps: 5
  impact_bps: 5
