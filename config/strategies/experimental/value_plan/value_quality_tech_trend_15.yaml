# 实验策略 - 质量过滤 + 价值排序 + 技术增强 + 趋势仓位控制
# 目标：在 quality_tech_15 基础上降低回撤
name: value_quality_tech_trend_15
description: "质量过滤+价值+技术+趋势仓位：quality_tech_15基础上用MA趋势控制回撤"

weights:
  alpha: 0.65
  risk: 0.0
  enhance: 0.35

factors:
  alpha:
    - name: book_to_price
      expression: book_to_market
      source: parquet
      ir: 0.14
    - name: ocf_to_ev
      expression: ocf_to_ev
      source: parquet
      ir: 0.33
    - name: ebit_to_mv
      expression: ebit_to_mv
      source: parquet
      ir: 0.33
  enhance:
    - name: turnover_rate_f
      expression: turnover_rate_f
      source: parquet
      negate: true
      ir: 0.42
    - name: ema5_dev
      expression: "$close / EMA($close, 5) - 1"
      source: qlib
      negate: true
      ir: 0.51

selection:
  mode: factor_topk
  topk: 15
  universe: all
  neutralize_industry: true
  min_market_cap: 80
  exclude_st: true
  exclude_new_days: 120
  sticky: 10
  score_smoothing_days: 5
  hard_filters:
    roa_fina: 0
    ocf_to_ev: 0

rebalance:
  freq: month

position:
  model: trend

trading:
  buy_commission_rate: 0.0003
  sell_commission_rate: 0.0003
  sell_stamp_tax_rate: 0.0010
  slippage_bps: 5
  impact_bps: 5
