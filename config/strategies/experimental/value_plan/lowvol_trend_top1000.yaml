# 低波动+趋势策略：前1000市值中选低波动股做趋势
# 第一层：total_mv 前20%（≈前1000市值）
# 第二层：低波动（价格波动率+换手率）排名选股
# 仓位：趋势控制（MA20/MA60）
name: lowvol_trend_top1000
description: "前1000市值低波动趋势：大市值+低波动率选股+MA趋势仓位控制"

weights:
  alpha: 0.0
  risk: 1.0
  enhance: 0.0

factors:
  risk:
    - name: ret_vol_20d
      expression: "Std($close / Ref($close, 1) - 1, 20)"
      source: qlib
      negate: true    # 低波动率优先
      ir: 0.30
    - name: turnover_rate_f
      expression: turnover_rate_f
      source: parquet
      negate: true    # 低换手率优先
      ir: 0.42

selection:
  mode: factor_topk
  topk: 15
  universe: all
  neutralize_industry: true
  exclude_st: true
  exclude_new_days: 120
  sticky: 10
  score_smoothing_days: 5
  hard_filter_quantiles:
    total_mv: 0.80   # 前20%市值 ≈ 前1000只大市值股

rebalance:
  freq: month

position:
  model: trend

trading:
  buy_commission_rate: 0.0003
  sell_commission_rate: 0.0003
  sell_stamp_tax_rate: 0.0010
  slippage_bps: 5
  impact_bps: 5
