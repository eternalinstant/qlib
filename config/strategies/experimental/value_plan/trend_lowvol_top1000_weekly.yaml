# 趋势为主+低波动辅助(周频)：选"正在涨的稳定股"
# 前1000市值 → 趋势动量(70%) + 低波动(30%) → 周频调仓
name: trend_lowvol_top1000_weekly
description: "前1000市值趋势+低波动辅助：趋势70%+低波动30%，周频调仓"

weights:
  alpha: 0.0
  risk: 0.30
  enhance: 0.70

factors:
  risk:
    - name: ret_vol_20d
      expression: "Std($close / Ref($close, 1) - 1, 20)"
      source: qlib
      negate: true
      ir: 0.30
    - name: turnover_rate_f
      expression: turnover_rate_f
      source: parquet
      negate: true
      ir: 0.42
  enhance:
    - name: ema5_dev
      expression: "$close / EMA($close, 5) - 1"
      source: qlib
      ir: 0.51
    - name: close_vs_ma20
      expression: "$close / Mean($close, 20) - 1"
      source: qlib
      ir: 0.45

selection:
  mode: factor_topk
  topk: 15
  universe: all
  neutralize_industry: true
  exclude_st: true
  exclude_new_days: 120
  buffer: 10
  hard_filter_quantiles:
    total_mv: 0.80

rebalance:
  freq: week

position:
  model: trend

trading:
  buy_commission_rate: 0.0003
  sell_commission_rate: 0.0003
  sell_stamp_tax_rate: 0.0010
  slippage_bps: 5
  impact_bps: 5
