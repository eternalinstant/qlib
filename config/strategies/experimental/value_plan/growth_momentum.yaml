name: growth_momentum
description: 成长+动量：营收增长+利润增长+趋势
weights:
  alpha: 0.6
  risk: 0.0
  enhance: 0.4
factors:
  alpha:
  - name: revenue_inc
    expression: revenue_inc
    source: parquet
    ir: 0.25
  - name: n_income_inc
    expression: n_income_inc
    source: parquet
    ir: 0.25
  - name: total_revenue_inc
    expression: total_revenue_inc
    source: parquet
    ir: 0.2
  enhance:
  - name: turnover_rate_f
    expression: turnover_rate_f
    source: parquet
    negate: true
    ir: 0.42
  - name: ema5_dev
    expression: $close / EMA($close, 5) - 1
    source: qlib
    negate: true
    ir: 0.51
selection:
  mode: factor_topk
  topk: 10
  universe: all
  neutralize_industry: true
  min_market_cap: 80
  exclude_st: true
  exclude_new_days: 120
  sticky: 10
  score_smoothing_days: 10
rebalance:
  freq: month
position:
  model: trend
trading:
  buy_commission_rate: 0.0003
  sell_commission_rate: 0.0003
  sell_stamp_tax_rate: 0.001
  slippage_bps: 5
  impact_bps: 5
