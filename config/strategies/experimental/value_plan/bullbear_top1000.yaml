# bullbear策略限定前1000市值(日频)
# 前1000市值 → bull/bear power纯技术选股 → 日频调仓
name: bullbear_top1000
description: "前1000市值bullbear：纯技术因子ema5+bull+bear，日频调仓"

weights:
  alpha: 0.0
  risk: 0.0
  enhance: 1.0

factors:
  enhance:
    - name: ema5_dev
      expression: "$close / EMA($close, 5) - 1"
      source: qlib
      ir: 0.51
    - name: bull_power
      expression: "$high - EMA($close, 13)"
      source: qlib
      ir: 0.68
    - name: bear_power
      expression: "$low - EMA($close, 13)"
      source: qlib
      ir: 0.69

selection:
  mode: factor_topk
  topk: 15
  universe: all
  neutralize_industry: true
  exclude_st: true
  exclude_new_days: 120
  buffer: 10
  hard_filter_quantiles:
    total_mv: 0.80

rebalance:
  freq: day

position:
  model: fixed
  stock_pct: 0.88

trading:
  buy_commission_rate: 0.0003
  sell_commission_rate: 0.0003
  sell_stamp_tax_rate: 0.0010
  slippage_bps: 5
  impact_bps: 5
  block_limit_up_buy: true
  block_limit_down_sell: true
