# 纯enhance + 质量硬过滤：最强技术策略叠加基本面门槛
name: bullbear_pure_enhance_quality
description: "纯enhance(ema5+bull+bear) + ROA>0+OCF>0硬过滤，测试质量门控对最强技术策略的影响"

weights:
  alpha: 0.0
  risk: 0.0
  enhance: 1.0

factors:
  enhance:
    - name: ema5_dev
      expression: "$close / EMA($close, 5) - 1"
      source: qlib
      ir: 0.51
    - name: bull_power
      expression: "$high - EMA($close, 13)"
      source: qlib
      ir: 0.68
    - name: bear_power
      expression: "$low - EMA($close, 13)"
      source: qlib
      ir: 0.69

selection:
  mode: factor_topk
  topk: 15
  universe: all
  neutralize_industry: true
  min_market_cap: 80
  exclude_st: true
  exclude_new_days: 120
  sticky: 5
  buffer: 10
  hard_filters:
    roa_fina: 0       # ROA > 0
    ocf_to_ev: 0       # 经营现金流 > 0

rebalance:
  freq: day

position:
  model: fixed
  stock_pct: 0.85

trading:
  buy_commission_rate: 0.0003
  sell_commission_rate: 0.0003
  sell_stamp_tax_rate: 0.0010
  slippage_bps: 5
  impact_bps: 5
  block_limit_up_buy: true
  block_limit_down_sell: true
