# 实验策略 - 账面市值比单因子止损版
name: value_book_stoploss_15
description: "价值实验：只用 book_to_price 作为主因子，在 stoploss_replace 模式下验证计划里最原始的估值单因子"

weights:
  alpha: 1.0
  risk: 0.0
  enhance: 0.0

factors:
  alpha:
    - name: book_to_price
      expression: book_to_market
      source: parquet
      ir: 0.14

selection:
  mode: stoploss_replace
  topk: 15
  universe: all
  neutralize_industry: true
  min_market_cap: 80
  exclude_st: true
  exclude_new_days: 120
  score_smoothing_days: 5
  stoploss_lookback_days: 20
  stoploss_drawdown: 0.10
  replacement_pool_size: 30

rebalance:
  freq: day

position:
  model: fixed
  stock_pct: 0.88

trading:
  buy_commission_rate: 0.0003
  sell_commission_rate: 0.0003
  sell_stamp_tax_rate: 0.0010
  slippage_bps: 5
  impact_bps: 5
  block_limit_up_buy: true
  block_limit_down_sell: true
