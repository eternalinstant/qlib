# 实验策略 - 价值计划超集中止损版 Top3
name: value_book_ocf_stoploss_replace_3
description: "价值计划超集中版：book_to_price + ocf_to_ev，在 stoploss_replace 模式下将持仓收缩到 Top3"

weights:
  alpha: 1.0
  risk: 0.0
  enhance: 0.0

factors:
  alpha:
    - name: book_to_price
      expression: book_to_market
      source: parquet
      ir: 0.14
    - name: ocf_to_ev
      expression: ocf_to_ev
      source: parquet
      ir: 0.33

selection:
  mode: stoploss_replace
  topk: 3
  universe: all
  neutralize_industry: true
  min_market_cap: 80
  exclude_st: true
  exclude_new_days: 120
  score_smoothing_days: 5
  stoploss_lookback_days: 20
  stoploss_drawdown: 0.10
  replacement_pool_size: 12

rebalance:
  freq: day

position:
  model: fixed
  stock_pct: 0.88

trading:
  buy_commission_rate: 0.0003
  sell_commission_rate: 0.0003
  sell_stamp_tax_rate: 0.0010
  slippage_bps: 5
  impact_bps: 5
  block_limit_up_buy: true
  block_limit_down_sell: true
