# 实验策略 - 固定55%仓位：目标回撤 <18%
name: bullbear_fixed_55pct
description: "固定55%仓位：简化管理，目标回撤 <18%"

weights:
  alpha: 0.0
  risk: 0.05
  enhance: 0.95

factors:
  risk:
    - name: turnover_rate_f
      ir: 0.42
  enhance:
    - name: ema5_dev
      expression: "$close / EMA($close, 5) - 1"
      source: qlib
      ir: 0.51
    - name: bull_power
      expression: "$high - EMA($close, 13)"
      source: qlib
      ir: 0.68
    - name: bear_power
      expression: "$low - EMA($close, 13)"
      source: qlib
      ir: 0.69

selection:
  topk: 15
  universe: all
  neutralize_industry: true
  min_market_cap: 80
  exclude_st: true
  exclude_new_days: 120
  sticky: 5
  buffer: 10

rebalance:
  freq: day

position:
  model: fixed
  stock_pct: 0.55

trading:
  buy_commission_rate: 0.0003
  sell_commission_rate: 0.0003
  sell_stamp_tax_rate: 0.0010
  slippage_bps: 5
  impact_bps: 5
  block_limit_up_buy: true
  block_limit_down_sell: true

validity:
  lookback_days: 40
  min_observations: 30
  min_total_return: -0.02
  min_annual_return: -0.03
  min_sharpe: 0.10
  max_drawdown: -0.05
  action: reduce
  reduce_to: 0.35
