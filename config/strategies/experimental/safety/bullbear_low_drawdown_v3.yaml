# 实验策略 - 低回撤版 v3：极保守仓位 + 高波动过滤
name: bullbear_low_drawdown_v3
description: "低回撤实验：60%固定仓位 + 高波动率过滤，目标回撤 <15%"

weights:
  alpha: 0.0
  risk: 0.35      # 风险层主导
  enhance: 0.65

factors:
  risk:
    - name: vol_std_20d
      expression: "Std(($close - Ref($close, 1)) / Ref($close, 1), 20)"
      source: qlib
      negate: true
      ir: 0.31
    - name: turnover_rate_f
      ir: 0.42
  enhance:
    - name: ema5_dev
      expression: "$close / EMA($close, 5) - 1"
      source: qlib
      ir: 0.51
    - name: bull_power
      expression: "$high - EMA($close, 13)"
      source: qlib
      ir: 0.68
    - name: bear_power
      expression: "$low - EMA($close, 13)"
      source: qlib
      ir: 0.69

selection:
  topk: 15
  universe: all
  neutralize_industry: true
  min_market_cap: 100     # 更高市值门槛
  exclude_st: true
  exclude_new_days: 180   # 更长新股排除
  sticky: 5
  buffer: 10

rebalance:
  freq: day

position:
  model: fixed
  stock_pct: 0.60    # 固定60%仓位

trading:
  buy_commission_rate: 0.0003
  sell_commission_rate: 0.0003
  sell_stamp_tax_rate: 0.0010
  slippage_bps: 5
  impact_bps: 5
  block_limit_up_buy: true
  block_limit_down_sell: true

validity:
  lookback_days: 40
  min_observations: 30
  min_total_return: -0.02
  min_annual_return: -0.03
  min_sharpe: 0.15
  max_drawdown: -0.06
  action: reduce
  reduce_to: 0.40
