# 实验策略 - bullbear 周频版：验证频率是否过高
name: bullbear_weekly
description: "bull/bear 主线周频版：保留全市场约束，验证降频是否显著改善真实执行表现"

weights:
  alpha: 0.0
  risk: 0.0
  enhance: 1.0

factors:
  enhance:
    - name: bull_power
      expression: "$high - EMA($close, 13)"
      source: qlib
      ir: 0.68
    - name: bear_power
      expression: "$low - EMA($close, 13)"
      source: qlib
      ir: 0.69

selection:
  topk: 15
  universe: all
  neutralize_industry: true
  min_market_cap: 50
  exclude_st: true
  exclude_new_days: 120
  sticky: 5
  buffer: 10

rebalance:
  freq: week

position:
  model: fixed
  stock_pct: 0.88

trading:
  buy_commission_rate: 0.0003
  sell_commission_rate: 0.0003
  sell_stamp_tax_rate: 0.0010
  slippage_bps: 5
  impact_bps: 5
  block_limit_up_buy: true
  block_limit_down_sell: true
