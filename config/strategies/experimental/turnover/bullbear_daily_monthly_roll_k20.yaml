# 实验策略 - bullbear 日频慢换仓版：保留日频信号，但按“月度节奏”逐步完成换仓
name: bullbear_daily_monthly_roll_k20
description: "bull/bear 主线日频慢换仓版 TopK20：每天看信号，但新票需更强确认、旧票需更弱确认，每天最多换 1 只，理论上接近 1 个月才可能完成整包切换"

weights:
  alpha: 0.0
  risk: 0.0
  enhance: 1.0

factors:
  enhance:
    - name: bull_power
      expression: "$high - EMA($close, 13)"
      source: qlib
      ir: 0.68
    - name: bear_power
      expression: "$low - EMA($close, 13)"
      source: qlib
      ir: 0.69

selection:
  mode: factor_topk
  topk: 20
  universe: all
  neutralize_industry: true
  min_market_cap: 50
  exclude_st: true
  exclude_new_days: 120
  sticky: 5
  buffer: 20
  score_smoothing_days: 5
  entry_rank: 12
  exit_rank: 40
  entry_persist_days: 3
  exit_persist_days: 3
  min_hold_days: 15

stability:
  churn_limit: 1
  margin_stable: true

rebalance:
  freq: day

position:
  model: fixed
  stock_pct: 0.88

trading:
  buy_commission_rate: 0.0003
  sell_commission_rate: 0.0003
  sell_stamp_tax_rate: 0.0010
  slippage_bps: 5
  impact_bps: 5
  block_limit_up_buy: true
  block_limit_down_sell: true
