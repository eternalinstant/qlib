# 月频bullbear + 趋势仓位：降成本(月频) + 控回撤(趋势仓位)
name: bullbear_monthly_trend
description: "月频bullbear+极保守趋势仓位：月频降成本到~1%，趋势仓位控回撤到20%以内"

weights:
  alpha: 0.0
  risk: 0.0
  enhance: 1.0

factors:
  enhance:
    - name: bull_power
      expression: "$high - EMA($close, 13)"
      source: qlib
      ir: 0.68
    - name: bear_power
      expression: "$low - EMA($close, 13)"
      source: qlib
      ir: 0.69

selection:
  topk: 15
  universe: all
  neutralize_industry: true
  min_market_cap: 80
  exclude_st: true
  exclude_new_days: 120
  sticky: 5
  buffer: 10

rebalance:
  freq: month

position:
  model: trend
  strong_bull_threshold: 0.05
  mild_bull_threshold: 0.02
  mild_bear_threshold: -0.02
  strong_bear_threshold: -0.05
  regime_allocations:
    strong_bull: 0.75
    mild_bull: 0.60
    neutral: 0.45
    mild_bear: 0.30
    strong_bear: 0.20
  opportunity_thresholds:
    - [-0.12, 0.45, light]
    - [-0.18, 0.60, moderate]
  smoothing_factor: 0.70

trading:
  buy_commission_rate: 0.0003
  sell_commission_rate: 0.0003
  sell_stamp_tax_rate: 0.0010
  slippage_bps: 5
  impact_bps: 5
  block_limit_up_buy: true
  block_limit_down_sell: true
