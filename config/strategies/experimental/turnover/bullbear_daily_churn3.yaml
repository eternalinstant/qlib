# 实验策略 - bullbear 日频限换手版：验证日频是否还能保留 edge
name: bullbear_daily_churn3
description: "bull/bear 主线日频限换手版：保留日频信号，但单次最多换 3 只票"

weights:
  alpha: 0.0
  risk: 0.0
  enhance: 1.0

factors:
  enhance:
    - name: bull_power
      expression: "$high - EMA($close, 13)"
      source: qlib
      ir: 0.68
    - name: bear_power
      expression: "$low - EMA($close, 13)"
      source: qlib
      ir: 0.69

selection:
  topk: 15
  universe: all
  neutralize_industry: true
  min_market_cap: 50
  exclude_st: true
  exclude_new_days: 120
  sticky: 5
  buffer: 10

stability:
  churn_limit: 3
  margin_stable: true

rebalance:
  freq: day

position:
  model: fixed
  stock_pct: 0.88

trading:
  buy_commission_rate: 0.0003
  sell_commission_rate: 0.0003
  sell_stamp_tax_rate: 0.0010
  slippage_bps: 5
  impact_bps: 5
  block_limit_up_buy: true
  block_limit_down_sell: true
