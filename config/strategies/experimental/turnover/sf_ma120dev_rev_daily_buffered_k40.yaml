# 实验策略 - 单因子 ma120_dev 反向日频轻缓冲版 Top40
name: sf_ma120dev_rev_daily_buffered_k40
description: "单因子 ma120_dev 反向日频轻缓冲版 TopK40：延续日频观测和轻缓冲执行，在降低持仓数的同时控制换手和费用"

weights:
  alpha: 0.0
  risk: 0.0
  enhance: 1.0

factors:
  enhance:
    - name: ma120_dev
      expression: "$close / Mean($close, 120) - 1"
      source: qlib
      negate: true
      ir: 0.41

selection:
  mode: factor_topk
  topk: 40
  universe: all
  neutralize_industry: true
  min_market_cap: 50
  exclude_st: true
  exclude_new_days: 120
  sticky: 0
  buffer: 12
  score_smoothing_days: 2
  entry_rank: 35
  exit_rank: 55
  entry_persist_days: 2
  exit_persist_days: 2
  min_hold_days: 5

stability:
  churn_limit: 5
  margin_stable: true

rebalance:
  freq: day

position:
  model: fixed
  stock_pct: 0.88

trading:
  buy_commission_rate: 0.00008
  sell_commission_rate: 0.00008
  min_buy_commission: 5.0
  min_sell_commission: 5.0
  sell_stamp_tax_rate: 0.0005
  slippage_bps: 5
  impact_bps: 5
  block_limit_up_buy: true
  block_limit_down_sell: true
