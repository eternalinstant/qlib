# 动态组合策略 - 20% 基础现金三策略分散版
name: diversified_guard_dynamic_20
description: "组合母策略：35% bullbear + 5% low_drawdown + 40% ultra_conservative + 20% cash，平时保留 20% 现金，弱势期用组合层 validity 继续收缩风险"

composition:
  components:
    - strategy: test_bullbear_constrained_all
      weight: 0.35
    - strategy: test_low_drawdown_constrained_all
      weight: 0.05
    - strategy: experimental/safety/bullbear_ultra_conservative
      weight: 0.40
  cash_weight: 0.20

validity:
  lookback_days: 30
  min_observations: 20
  min_total_return: -0.01
  min_annual_return: -0.05
  min_sharpe: 0.00
  max_drawdown: -0.05
  action: reduce
  reduce_to: 0.84
  apply_in_backtest: true
