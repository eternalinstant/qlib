# 默认稳健策略
name: default
description: "默认优化策略：价值质量 + 低波低换手 + 多空力道"

factors:
  alpha:
    - {name: ebit_to_mv, expression: ebit_to_mv, source: parquet, ir: 0.33}
    - {name: ocf_to_ev, expression: ocf_to_ev, source: parquet, ir: 0.33}
    - {name: retained_earnings, expression: retained_earnings, source: parquet, ir: 0.33}
  risk:
    - name: ret_vol_20d
      expression: "Std(($close - Ref($close, 1)) / Ref($close, 1), 20)"
      source: qlib
      negate: true
      ir: 0.31
    - name: amt_std_6d
      expression: "Std($amount, 6) / (Mean($amount, 6) + 1)"
      source: qlib
      negate: true
      ir: 0.58
    - name: vol_std_10d
      expression: "Std($volume, 10) / (Mean($volume, 10) + 1)"
      source: qlib
      negate: true
      ir: 0.57
  enhance:
    - {name: bull_power, expression: "$high - EMA($close, 13)", source: qlib, ir: 0.63}
    - {name: bear_power, expression: "$low - EMA($close, 13)", source: qlib, ir: 0.46}
    - name: vol_ema26_ratio
      expression: "$volume / (EMA($volume, 26) + 1)"
      source: qlib
      negate: true
      ir: 0.47

selection:
  neutralize_industry: true

position:
  model: trend
