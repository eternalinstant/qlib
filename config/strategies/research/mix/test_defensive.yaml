# 策略F - 防御组合 (高alpha + 高risk)
name: test_defensive
description: "防御组合：alpha30% + risk30% + enhance40%"

weights:
  alpha: 0.30
  risk: 0.30
  enhance: 0.40

factors:
  alpha:
    - name: roa
      expression: "roa_fina"
      source: parquet
      ir: 0.30
    - name: ebit_to_mv
      expression: "ebit_to_mv"
      source: parquet
      ir: 0.33
    - name: ocf_to_ev
      expression: "ocf_to_ev"
      source: parquet
      ir: 0.33
    - name: retained_earnings
      expression: "retained_earnings"
      source: parquet
      ir: 0.33
  risk:
    - name: vol_std_20d
      expression: "Std(($close - Ref($close, 1)) / Ref($close, 1), 20)"
      source: qlib
      negate: true
      ir: 0.31
    - name: turnover_rate_f
      expression: "turnover_rate_f"
      source: parquet
      negate: true
      ir: 0.42
  enhance:
    - name: bull_power
      expression: "$high - EMA($close, 13)"
      source: qlib
      ir: 0.68
    - name: bear_power
      expression: "$low - EMA($close, 13)"
      source: qlib
      ir: 0.69

selection:
  topk: 15
  universe: all
  neutralize_industry: true
  min_market_cap: 50
  sticky: 5
  buffer: 10

rebalance:
  freq: day

position:
  model: fixed
  stock_pct: 0.88

trading:
  buy_commission_rate: 0.0003
  sell_commission_rate: 0.0003
  sell_stamp_tax_rate: 0.0010
