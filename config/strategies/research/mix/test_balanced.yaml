# 策略E - 均衡组合 (alpha + risk + enhance)
name: test_balanced
description: "均衡组合：alpha20% + risk20% + enhance60%"

weights:
  alpha: 0.20
  risk: 0.20
  enhance: 0.60

factors:
  alpha:
    - name: roa
      expression: "roa_fina"
      source: parquet
      ir: 0.30
    - name: ebit_to_mv
      expression: "ebit_to_mv"
      source: parquet
      ir: 0.33
    - name: ocf_to_ev
      expression: "ocf_to_ev"
      source: parquet
      ir: 0.33
  risk:
    - name: vol_std_20d
      expression: "Std(($close - Ref($close, 1)) / Ref($close, 1), 20)"
      source: qlib
      negate: true
      ir: 0.31
    - name: turnover_rate_f
      expression: "turnover_rate_f"
      source: parquet
      negate: true
      ir: 0.42
  enhance:
    - name: bull_power
      expression: "$high - EMA($close, 13)"
      source: qlib
      ir: 0.68
    - name: bear_power
      expression: "$low - EMA($close, 13)"
      source: qlib
      ir: 0.69
    - name: bb_position
      expression: "($close - (Mean($close, 20) - 2 * Std($close, 20))) / (4 * Std($close, 20) + 1e-8)"
      source: qlib
      ir: 0.45
    - name: bb_upper_dist
      expression: "((Mean($close, 20) + 2 * Std($close, 20)) - $close) / $close"
      source: qlib
      negate: true
      ir: 0.50

selection:
  topk: 15
  universe: all
  neutralize_industry: true
  min_market_cap: 50
  sticky: 5
  buffer: 10

rebalance:
  freq: day

position:
  model: fixed
  stock_pct: 0.88

trading:
  buy_commission_rate: 0.0003
  sell_commission_rate: 0.0003
  sell_stamp_tax_rate: 0.0010
