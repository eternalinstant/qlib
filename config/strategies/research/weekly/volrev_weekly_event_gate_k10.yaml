# 研究策略 - 真周频量能反转组合（事件驱动版）
name: volrev_weekly_event_gate_k10
description: "真周频量能反转组合：vol_ema26_ratio + vol_std_20d_v + turnover_5d + ret_vol_120d，TopK10 事件驱动低换手版"

factor_window_scale: 5

weights:
  alpha: 0.0
  risk: 1.0
  enhance: 0.0

factors:
  risk:
    - name: vol_ema26_ratio
      expression: "$volume / (EMA($volume, 26) + 1)"
      source: qlib
      negate: true
    - name: vol_std_20d_v
      expression: "Std($volume, 20) / (Mean($volume, 20) + 1)"
      source: qlib
      negate: true
    - name: turnover_5d
      expression: "Mean($turnover_rate_f, 5)"
      source: qlib
      negate: true
    - name: ret_vol_120d
      expression: "-1 * Std((($close - Ref($close, 1)) / Ref($close, 1)), 120)"
      source: qlib

selection:
  mode: factor_topk
  topk: 10
  universe: all
  neutralize_industry: true
  min_market_cap: 50
  exclude_st: true
  exclude_new_days: 120
  sticky: 5
  buffer: 20
  score_smoothing_days: 3
  entry_rank: 8
  exit_rank: 20
  entry_persist_days: 2
  exit_persist_days: 2
  min_hold_days: 10

stability:
  churn_limit: 2
  margin_stable: true

rebalance:
  freq: week

position:
  model: fixed
  stock_pct: 0.88

trading:
  buy_commission_rate: 0.0003
  sell_commission_rate: 0.0003
  sell_stamp_tax_rate: 0.0010
  slippage_bps: 5
  impact_bps: 5
  block_limit_up_buy: true
  block_limit_down_sell: true
