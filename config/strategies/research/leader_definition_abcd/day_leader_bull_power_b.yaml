name: day_leader_bull_power_b
description: bull_power + 龙头定义B：自由流通市值前20% + 流动性去掉后20%
weights:
  alpha: 1.0
  risk: 0.0
  enhance: 0.0
factors:
  alpha:
  - name: bull_power
    expression: $high - EMA($close, 13)
    source: qlib
selection:
  mode: factor_topk
  universe: all
  neutralize_industry: true
  min_market_cap: 50
  exclude_st: true
  exclude_new_days: 120
  sticky: 5
  buffer: 20
  score_smoothing_days: 5
  entry_persist_days: 3
  exit_persist_days: 3
  min_hold_days: 10
  topk: 5
  entry_rank: 4
  exit_rank: 20
  hard_filter_quantiles:
    circ_mv: 0.8
    turnover_rate_f: 0.2
stability:
  churn_limit: 2
  margin_stable: true
rebalance:
  freq: day
position:
  model: fixed
  stock_pct: 0.88
trading:
  buy_commission_rate: 0.0003
  sell_commission_rate: 0.0003
  sell_stamp_tax_rate: 0.001
  slippage_bps: 5
  impact_bps: 5
  block_limit_up_buy: true
  block_limit_down_sell: true
