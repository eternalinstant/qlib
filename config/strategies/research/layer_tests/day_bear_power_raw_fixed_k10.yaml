# 分层实验 - bear_power 裸因子 + 固定仓位
name: day_bear_power_raw_fixed_k10
description: "分层实验1：bear_power 正向，日频裸 Top-K，固定仓位"

weights:
  alpha: 0.0
  risk: 0.0
  enhance: 1.0

factors:
  enhance:
    - name: bear_power
      expression: "$low - EMA($close, 13)"
      source: qlib

selection:
  mode: factor_topk
  topk: 10
  universe: all
  neutralize_industry: true
  min_market_cap: 50
  exclude_st: true
  exclude_new_days: 120
  sticky: 0
  buffer: 0
  score_smoothing_days: 1
  entry_persist_days: 1
  exit_persist_days: 1
  min_hold_days: 0

stability:
  churn_limit: 0
  margin_stable: false

rebalance:
  freq: day

position:
  model: fixed
  stock_pct: 0.88

trading:
  buy_commission_rate: 0.0003
  sell_commission_rate: 0.0003
  sell_stamp_tax_rate: 0.0010
  slippage_bps: 5
  impact_bps: 5
  block_limit_up_buy: true
  block_limit_down_sell: true
