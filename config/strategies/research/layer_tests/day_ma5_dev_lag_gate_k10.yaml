# 分层实验 - ma5_dev 反向 + 迟滞执行 + 市场闸门防守
name: day_ma5_dev_lag_gate_k10
description: "ma5_dev 反向，日频 event-gate 迟滞，双指数 MA60 仓位闸门"

weights:
  alpha: 1.0
  risk: 0.0
  enhance: 0.0

factors:
  alpha:
    - name: ma5_dev
      expression: "$close / Mean($close, 5) - 1"
      source: qlib
      negate: true

selection:
  mode: factor_topk
  topk: 10
  universe: all
  neutralize_industry: true
  min_market_cap: 50
  exclude_st: true
  exclude_new_days: 120
  sticky: 5
  buffer: 20
  score_smoothing_days: 5
  entry_rank: 7
  exit_rank: 25
  entry_persist_days: 3
  exit_persist_days: 3
  min_hold_days: 10

stability:
  churn_limit: 2
  margin_stable: true

rebalance:
  freq: day

position:
  model: gate
  ma_window: 60
  strong_stock_pct: 0.90
  mixed_stock_pct: 0.60
  weak_stock_pct: 0.30

trading:
  buy_commission_rate: 0.0003
  sell_commission_rate: 0.0003
  sell_stamp_tax_rate: 0.0010
  slippage_bps: 5
  impact_bps: 5
  block_limit_up_buy: true
  block_limit_down_sell: true
