# 策略B - 活跃波动组合
name: test_amplitude
description: "活跃波动组合：amplitude + bb_position + ema5_dev"

weights:
  alpha: 0.0
  risk: 0.0
  enhance: 1.0

factors:
  enhance:
    - name: amplitude
      expression: "($high - $low) / $close"
      source: qlib
      ir: 0.71
    - name: bb_position
      expression: "($close - (Mean($close, 20) - 2 * Std($close, 20))) / (4 * Std($close, 20) + 1e-8)"
      source: qlib
      ir: 0.45
    - name: ema5_dev
      expression: "$close / EMA($close, 5) - 1"
      source: qlib
      ir: 0.66

selection:
  topk: 15
  universe: all
  neutralize_industry: true
  min_market_cap: 50
  sticky: 5
  buffer: 10

rebalance:
  freq: day

position:
  model: fixed
  stock_pct: 0.88

trading:
  buy_commission_rate: 0.0003
  sell_commission_rate: 0.0003
  sell_stamp_tax_rate: 0.0010
