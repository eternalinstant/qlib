name: day_leader_top1000_close_to_high_20d_pos_fixed30_k10
description: 龙头追涨仓位扫描：top1000市值近似龙头，close_to_high_20d 正向，fixed 30%
weights:
  alpha: 1.0
  risk: 0.0
  enhance: 0.0
factors:
  alpha:
  - name: close_to_high_20d
    expression: $close / Max($close, 20) - 1
    source: qlib
selection:
  mode: factor_topk
  topk: 10
  universe: all
  neutralize_industry: true
  min_market_cap: 50
  exclude_st: true
  exclude_new_days: 120
  sticky: 5
  buffer: 20
  score_smoothing_days: 5
  entry_rank: 7
  exit_rank: 25
  entry_persist_days: 3
  exit_persist_days: 3
  min_hold_days: 10
  hard_filter_quantiles:
    total_mv: 0.8
stability:
  churn_limit: 2
  margin_stable: true
rebalance:
  freq: day
position:
  model: fixed
  stock_pct: 0.3
trading:
  buy_commission_rate: 0.0003
  sell_commission_rate: 0.0003
  sell_stamp_tax_rate: 0.001
  slippage_bps: 5
  impact_bps: 5
  block_limit_up_buy: true
  block_limit_down_sell: true
