description: 方案A：质量40%+低波30%+反转30%，月频
factors:
  alpha:
  - expression: roa_fina
    ir: 0.30
    name: roa
    source: parquet
  - expression: ebit_to_mv
    ir: 0.33
    name: ebit_to_mv
    source: parquet
  risk:
  - expression: "Std(($close - Ref($close, 1)) / Ref($close, 1), 20)"
    ir: 0.31
    name: vol_std_20d
    negate: true
    source: qlib
  - expression: turnover_rate_f
    ir: 0.42
    name: turnover_rate_f
    negate: true
    source: parquet
  enhance:
  - expression: "$close / Ref($close, 20) - 1"
    ir: 0.38
    name: mom_20d
    negate: true
    source: qlib
name: research/multi_factor/planA_quality_lowvol_reversal_month
position:
  model: fixed
  stock_pct: 0.88
rebalance:
  freq: month
selection:
  exclude_new_days: 120
  exclude_st: true
  min_market_cap: 80
  mode: stoploss_replace
  neutralize_industry: true
  replacement_pool_size: 30
  score_smoothing_days: 5
  stoploss_drawdown: 0.2
  stoploss_lookback_days: 20
  topk: 15
  universe: all
trading:
  block_limit_down_sell: true
  block_limit_up_buy: true
  buy_commission_rate: 0.0003
  impact_bps: 2
  sell_commission_rate: 0.0003
  sell_stamp_tax_rate: 0.001
  slippage_bps: 5
weights:
  alpha: 0.4
  enhance: 0.3
  risk: 0.3
