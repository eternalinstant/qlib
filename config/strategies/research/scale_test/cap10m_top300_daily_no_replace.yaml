description: 1000万/top300/日频/factor_topk无止损替换 — 纯选股
factors:
  alpha:
  - expression: book_to_market
    ir: 0.14
    name: book_to_price
    source: parquet
  - expression: ocf_to_ev
    ir: 0.33
    name: ocf_to_ev
    source: parquet
name: research/scale_test/cap10m_top300_daily_no_replace
position:
  model: trend
  params:
    ma_fast: 20
    ma_slow: 60
    peak_lookback: 120
    regime_allocations:
      mild_bear: 0.65
      mild_bull: 0.90
      neutral: 0.80
      strong_bear: 0.50
      strong_bull: 1.00
rebalance:
  freq: day
selection:
  buffer: 0
  entry_persist_days: 1
  entry_rank: 300
  exclude_new_days: 120
  exclude_st: true
  exit_persist_days: 1
  exit_rank: 300
  min_hold_days: 1
  min_market_cap: 80
  mode: factor_topk
  neutralize_industry: true
  score_smoothing_days: 5
  sticky: 0
  topk: 300
  universe: all
trading:
  block_limit_down_sell: true
  block_limit_up_buy: true
  buy_commission_rate: 0.0003
  impact_bps: 2
  sell_commission_rate: 0.0003
  sell_stamp_tax_rate: 0.001
  slippage_bps: 5
weights:
  alpha: 1.0
  enhance: 0.0
  risk: 0.0
