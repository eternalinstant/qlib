# 研究策略 - 单因子 turnover_20d_120d_ratio 日频事件驱动版
name: day_turnover20_120_ratio_rev_event_gate_k10
description: "单因子 turnover_20d_120d_ratio 反向，沿用日频 event-gate k10 正式口径"

weights:
  alpha: 0.0
  risk: 1.0
  enhance: 0.0

factors:
  risk:
    - name: turnover_20d_120d_ratio
      expression: "Mean($turnover_rate_f, 20) / (Mean($turnover_rate_f, 120) + 1e-8)"
      source: qlib
      negate: true

selection:
  mode: factor_topk
  topk: 10
  universe: all
  neutralize_industry: true
  min_market_cap: 50
  exclude_st: true
  exclude_new_days: 120
  sticky: 5
  buffer: 20
  score_smoothing_days: 5
  entry_rank: 7
  exit_rank: 25
  entry_persist_days: 3
  exit_persist_days: 3
  min_hold_days: 10

stability:
  churn_limit: 2
  margin_stable: true

rebalance:
  freq: day

position:
  model: fixed
  stock_pct: 0.88

trading:
  buy_commission_rate: 0.0003
  sell_commission_rate: 0.0003
  sell_stamp_tax_rate: 0.0010
  slippage_bps: 5
  impact_bps: 5
  block_limit_up_buy: true
  block_limit_down_sell: true
