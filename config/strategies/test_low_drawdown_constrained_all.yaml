# 策略A - 低回撤动量组合（全市场约束版）
name: test_low_drawdown_constrained_all
description: "低回撤组合全市场约束版：bull_power + bear_power + bb_position + bb_upper_dist，保留ST过滤/新股过滤/成交约束"

weights:
  alpha: 0.0
  risk: 0.0
  enhance: 1.0

factors:
  enhance:
    - name: bull_power
      expression: "$high - EMA($close, 13)"
      source: qlib
      ir: 0.68
    - name: bear_power
      expression: "$low - EMA($close, 13)"
      source: qlib
      ir: 0.69
    - name: bb_position
      expression: "($close - (Mean($close, 20) - 2 * Std($close, 20))) / (4 * Std($close, 20) + 1e-8)"
      source: qlib
      ir: 0.45
    - name: bb_upper_dist
      expression: "((Mean($close, 20) + 2 * Std($close, 20)) - $close) / $close"
      source: qlib
      negate: true
      ir: 0.50

selection:
  topk: 15
  universe: all
  neutralize_industry: true
  min_market_cap: 50
  exclude_st: true
  exclude_new_days: 120
  sticky: 5
  buffer: 10

rebalance:
  freq: day

position:
  model: fixed
  stock_pct: 0.88

trading:
  buy_commission_rate: 0.0003
  sell_commission_rate: 0.0003
  sell_stamp_tax_rate: 0.0010
  slippage_bps: 5
  impact_bps: 5
  block_limit_up_buy: true
  block_limit_down_sell: true
