name: push25_combo_only_k8d2_very_tight

data:
  source: parquet
  start_date: "2019-01-01"
  end_date: "2026-04-15"
  feature_columns:
    - rank_value_profit_core
    - rank_balance_core
    - qvf_core_interaction

label:
  horizon_days: 20

training:
  train_start: "2019-01-01"
  train_end: "2022-12-31"
  valid_start: "2023-01-01"
  valid_end: "2023-12-31"

scoring:
  start_date: "2019-01-01"
  end_date: "2026-04-15"

model:
  preferred_backend: lightgbm
  params:
    learning_rate: 0.05
    n_estimators: 200
    max_depth: 4
    min_child_samples: 32
    random_state: 42
    verbosity: -1

selection:
  freq: biweek
  topk: 8
  universe: csi300
  min_market_cap: 120
  exclude_st: true
  exclude_new_days: 120
  sticky: 6
  threshold: 0.0
  churn_limit: 2
  margin_stable: false
  buffer: 0
  score_smoothing_days: 1
  mode: factor_topk
  entry_persist_days: 1
  exit_persist_days: 1
  min_hold_days: 0
  stoploss_lookback_days: 20
  stoploss_drawdown: 0.10
  replacement_pool_size: 0

position:
  model: fixed
  params:
    stock_pct: 0.80

overlay:
  enabled: true
  target_vol: 0.19
  vol_lookback: 20
  trend_lookback: 20
  trend_exposure: 0.60
  dd_soft: 0.010
  dd_hard: 0.025
  soft_exposure: 0.65
  hard_exposure: 0.25
  exposure_min: 0.0
  exposure_max: 1.0

trading:
  buy_commission_rate: 0.0003
  sell_commission_rate: 0.0003
  sell_stamp_tax_rate: 0.0010
  min_buy_commission: 5.0
  min_sell_commission: 5.0
  slippage_bps: 5.0
  impact_bps: 5.0

output:
  root: "results/model_signals/push25_combo_only_k8d2_very_tight"
