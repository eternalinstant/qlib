name: lgb_10d_biweek_csi300

data:
  start_date: "2019-01-01"
  end_date: "2026-04-15"
  feature_columns:
    - book_to_market
    - roic_proxy
    - ebit_to_mv
    - ebitda_to_mv
    - ocf_to_mv
    - ocf_to_ev
    - fcff_to_mv
    - roe_fina
    - roe_dt_fina
    - roa_fina
    - current_ratio_fina
    - quick_ratio_fina
    - debt_to_assets_fina
    - net_margin
    - total_revenue_inc
    - operate_profit_inc
    - n_cashflow_act
    - net_mf_amount_5d
    - net_mf_amount_20d
    - smart_ratio_5d
    - net_mf_vol_5d

label:
  horizon_days: 10

training:
  train_start: "2019-01-01"
  train_end: "2022-12-31"
  valid_start: "2023-01-01"
  valid_end: "2023-12-31"

scoring:
  start_date: "2024-01-01"
  end_date: "2026-04-15"

model:
  preferred_backend: lightgbm
  params:
    learning_rate: 0.05
    n_estimators: 320
    max_depth: 4
    min_child_samples: 32
    random_state: 42
    verbosity: -1

selection:
  freq: biweek
  topk: 8
  universe: csi300
  min_market_cap: 80
  exclude_st: true
  exclude_new_days: 120
  sticky: 0
  threshold: 0.0
  churn_limit: 0
  margin_stable: false
  buffer: 0
  score_smoothing_days: 1

position:
  model: gate
  params:
    ma_window: 60
    strong_stock_pct: 0.95
    mixed_stock_pct: 0.65
    weak_stock_pct: 0.20

trading:
  buy_commission_rate: 0.0003
  sell_commission_rate: 0.0003
  sell_stamp_tax_rate: 0.0010
  min_buy_commission: 5.0
  min_sell_commission: 5.0
  slippage_bps: 5.0
  impact_bps: 5.0

output:
  root: "results/model_signals/lgb_10d_biweek_csi300"
